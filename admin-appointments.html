<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments — Admin — The BeautyLoft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <a href="index.html" class="logo">The <span>BeautyLoft</span></a>
    <p class="admin-tag">Admin</p>

    <nav class="admin-nav">
  <a href="admin-dashboard.html" class="admin-nav-link">Dashboard</a>
  <a href="admin-appointments.html" class="admin-nav-link">Appointments</a>
  <a href="admin-model-availability.html" class="admin-nav-link">Model Availability</a>
  <a href="admin-model-bookings.html" class="admin-nav-link">Model Bookings</a>
  <a href="admin-orders.html" class="admin-nav-link">Shop Orders</a>
  <a href="admin-products.html" class="admin-nav-link">Products</a>
  <a href="admin-models.html" class="admin-nav-link">Model Applications</a>
  <a href="admin-availability.html" class="admin-nav-link">Availability</a>
  <a href="admin-customers.html" class="admin-nav-link">Customers</a>
  <a href="admin-notifications.html" class="admin-nav-link">Notifications</a>
  <a href="admin-settings.html" class="admin-nav-link">Settings</a>
</nav>

    <button id="adminLogoutBtn" class="admin-logout">Log out</button>
  </aside>

  <button id="mobileSidebarToggle" class="mobile-sidebar-toggle">☰ Menu</button>

  <main class="admin-main">
    <h1>Appointments</h1>
    <input type="text" id="searchBookingId" placeholder="Search by Booking ID..." style="max-width:300px; padding:12px 16px; border-radius:10px; border:1px solid var(--line); margin-bottom:16px;">
    <div id="appointmentsAdminTable" style="margin-top:30px;">Loading...</div>
  </main>

</div>

<div id="rescheduleModal" style="display:none; position:fixed; inset:0; background:rgba(46,38,34,0.6); z-index:300; align-items:center; justify-content:center; padding:20px;">
  <div class="cal-card" style="max-width:420px; width:100%; max-height:90vh; overflow-y:auto; position:relative;">
    <button id="closeRescheduleModal" style="position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.4rem; cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:16px;">Reschedule Appointment</h3>

    <div class="cal-header">
      <button class="cal-nav-btn" id="rescheduleCalPrev">‹</button>
      <h3 id="rescheduleCalMonthLabel"></h3>
      <button class="cal-nav-btn" id="rescheduleCalNext">›</button>
    </div>
    <div class="cal-grid" id="rescheduleCalGrid"></div>

    <div id="rescheduleSlotSection" style="display:none; margin-top:16px;">
      <h4 id="rescheduleSlotDateLabel" style="font-size:0.95rem; margin-bottom:8px;"></h4>
      <div class="slot-grid" id="rescheduleSlotGrid"></div>
    </div>

    <div class="field" style="margin-top:16px;">
      <label for="rescheduleReason">Reason for rescheduling (optional)</label>
      <textarea id="rescheduleReason" placeholder="e.g. client requested a different time"></textarea>
    </div>

    <button class="admin-action-btn" id="confirmRescheduleBtn" disabled>Select a new date and time</button>
  </div>
</div>

<script src="admin-appointments.js"></script>
</body>
</html>
