<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — The BeautyLoft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">The BeautyLoft</a>
  <button id="menuToggle">☰</button>
  <nav>
    <ul id="navList">
      <li><a href="index.html#about">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="models.html">Models</a></li>
      <li><a href="signup.html">Sign Up</a></li>
      <li><a href="booking.html">Book Now</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="page-hero"  style="padding: 0; margin-top: 150px">
    <p class="eyebrow">Welcome Back</p>
    <h1>Log in to your account.</h1>
  </section>

  <section style="max-width:480px; margin:0 auto; padding-top:0;  padding: 10px; margin-top: 50px;">
    <div class="form-light">
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="submit-btn">Log in</button>
      </form>
      <div id="loginMessage"></div>
      <p style="text-align:center; margin-top:18px; font-size:0.9rem; color:var(--ink-soft);">
        Don't have an account? <a href="signup.html" style="color:var(--plum); font-weight:600;">Sign up</a>
      </p>
    </div>
  </section>
</main>

<script src="script.js"></script>
<script src="login.js"></script>
</body>
</html>
