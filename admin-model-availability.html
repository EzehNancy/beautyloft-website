<body>

  <aside class="admin-sidebar">
    <a href="index.html" class="logo">The <span>BeautyLoft</span></a>
    <p class="admin-tag">Admin</p>

    <nav class="admin-nav">
        <a href="admin-dashboard.html" class="admin-nav-link">Dashboard</a>
  <a href="admin-appointments.html" class="admin-nav-link">Appointments</a>
  <a href="admin-model-availability.html" class="admin-nav-link">Model Availability</a>

    <button id="adminLogoutBtn" class="admin-logout">Log out</button>
  </aside>

  <button id="mobileSidebarToggle" class="mobile-sidebar-toggle">☰ Menu</button>

  <main class="admin-main">
    <h1>Model Availability</h1>
    <p style="color:var(--ink-soft); margin-top:10px;">Dates models have marked themselves free. Assign a session to book them for that day.</p>
    <div class="cal-card" style="margin-top:24px;">
      <div id="modelAvailabilityList">Loading...</div>
    </div>
  </main>

</div>
<div id="assignModal" style="display:none; position:fixed; inset:0; background:rgba(46,38,34,0.6); z-index:300; align-items:center; justify-content:center; padding:20px;">
  <div class="cal-card" style="max-width:400px; width:100%; position:relative;">
    <button id="closeAssignModal" style="position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.4rem; cursor:pointer;">&times;</button>
    <h3 id="assignModalTitle" style="margin-bottom:16px;"></h3>
    <div id="assignSlotGrid" class="slot-grid"></div>
    <button class="submit-btn" id="confirmAssignBtn" disabled style="margin-top:20px;">Select a time first</button>
  </div>
</div>

<script src="admin-model-availability.js"></script>
