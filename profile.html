<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — The BeautyLoft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">The BeautyLoft</a>
  <button id="menuToggle">☰</button>
  <nav>
    <ul id="navList">
      <li><a href="index.html#about">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="models.html" id="modelsNavLink">Models</a></li>
      <li id="authNavItem"><a href="login.html">Log In</a></li>
      <li><a href="booking.html">Book Now</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="page-hero">
    <p class="eyebrow">My Account</p>
    <h1 id="welcomeHeading">Loading...</h1>
  </section>

  <section id="profileContent" style="padding-top:0;"></section>
</main>
<div id="rescheduleModal" style="display:none; position:fixed; inset:0; background:rgba(46,38,34,0.6); z-index:300; align-items:center; justify-content:center; padding:20px;">
  <div class="cal-card" style="max-width:420px; width:100%; max-height:90vh; overflow-y:auto; position:relative;">
    <button id="closeRescheduleModal" style="position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.4rem; cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:16px;">Reschedule Appointment</h3>

    <div class="cal-header">
      <button class="cal-nav-btn" id="rescheduleCalPrev">‹</button>
      <h3 id="rescheduleCalMonthLabel"></h3>
      <button class="cal-nav-btn" id="rescheduleCalNext">›</button>
    </div>
    <div class="cal-grid" id="rescheduleCalGrid"></div>

    <div id="rescheduleSlotSection" style="display:none; margin-top:16px;">
      <h4 id="rescheduleSlotDateLabel" style="font-size:0.95rem; margin-bottom:8px;"></h4>
      <div class="slot-grid" id="rescheduleSlotGrid"></div>
    </div>

    <div class="field" style="margin-top:16px;">
      <label for="rescheduleReason">Reason for rescheduling (optional)</label>
      <textarea id="rescheduleReason" placeholder="e.g. something came up"></textarea>
    </div>

    <button class="admin-action-btn" id="confirmRescheduleBtn" disabled>Select a new date and time</button>
  </div>
</div>
<script src="script.js"></script>
<script src="profile.js"></script>
</body>
</html>
