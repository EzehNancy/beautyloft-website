  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar">
    <a href="index.html" class="logo">The <span>BeautyLoft</span></a>
    <p class="admin-tag">Admin</p>

    <nav class="admin-nav">
  <a href="admin-dashboard.html" class="admin-nav-link">Dashboard</a>
  <a href="admin-appointments.html" class="admin-nav-link">Appointments</a>
  <a href="admin-model-bookings.html" class="admin-nav-link active">Model Bookings</a>
  <a href="admin-orders.html" class="admin-nav-link">Shop Orders</a>
  <a href="admin-products.html" class="admin-nav-link">Products</a>
  <a href="admin-models.html" class="admin-nav-link">Model Applications</a>
  <a href="admin-availability.html" class="admin-nav-link">Availability</a>
  <a href="admin-customers.html" class="admin-nav-link">Customers</a>
  <a href="admin-notifications.html" class="admin-nav-link">Notifications</a>
  <a href="admin-settings.html" class="admin-nav-link">Settings</a>
</nav>

    <button id="adminLogoutBtn" class="admin-logout">Log out</button>
  </aside>

  <button id="mobileSidebarToggle" class="mobile-sidebar-toggle">☰ Menu</button>

  <main class="admin-main">
    <h1>Model Bookings</h1>
    <div id="modelBookingsAdminTable" style="margin-top:30px;">Loading...</div>
  </main>

</div>

<div id="rescheduleModal" style="display:none; position:fixed; inset:0; background:rgba(46,38,34,0.6); z-index:300; align-items:center; justify-content:center;">
  <div class="cal-card" style="max-width:360px; width:90%; position:relative;">
    <button id="closeRescheduleModal" style="position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.4rem; cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:16px;">Reschedule Session</h3>
    <div class="field">
      <label for="rescheduleDate">New date</label>
      <input type="date" id="rescheduleDate">
    </div>
    <div class="field">
      <label for="rescheduleTime">New time</label>
      <input type="time" id="rescheduleTime">
    </div>
    <button class="admin-action-btn" id="confirmRescheduleBtn">Confirm Reschedule</button>
  </div>
</div>

<script src="admin-model-bookings.js"></script>
</body>
</html>
